<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mailchimp Analyser — Royal Solskjerming AS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-bottom:1px solid #334155;padding:24px 32px;display:flex;justify-content:space-between;align-items:center}.header h1{font-size:24px;font-weight:700;color:#f8fafc}.header h1 span{color:#38bdf8}.header .subtitle{color:#94a3b8;font-size:14px;margin-top:4px}.sync-btn{background:#2563eb;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}.sync-btn:hover{background:#1d4ed8}.sync-btn:disabled{opacity:.5;cursor:not-allowed}.container{max-width:1400px;margin:0 auto;padding:24px 32px}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}.stat-card .label{font-size:13px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}.stat-card .value{font-size:32px;font-weight:700;color:#f8fafc}.stat-card .value.green{color:#4ade80}.stat-card .value.blue{color:#38bdf8}.stat-card .value.amber{color:#fbbf24}.stat-card .value.rose{color:#fb7185}.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}.chart-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px}.chart-card h3{font-size:16px;font-weight:600;margin-bottom:16px;color:#f1f5f9}.table-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px;margin-bottom:24px}.table-card h3{font-size:16px;font-weight:600;margin-bottom:16px;color:#f1f5f9}table{width:100%;border-collapse:collapse}th{text-align:left;padding:10px 12px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;border-bottom:1px solid #334155}td{padding:10px 12px;font-size:14px;border-bottom:1px solid #1e293b;color:#cbd5e1}tr:hover td{background:#1e293b88}.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500}.badge.good{background:#064e3b;color:#6ee7b7}.badge.ok{background:#713f12;color:#fde68a}.badge.low{background:#7f1d1d;color:#fca5a5}.loading{text-align:center;padding:60px;color:#64748b;font-size:18px}.tabs{display:flex;gap:8px;margin-bottom:24px}.tab{padding:8px 16px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:14px;transition:all .2s}.tab.active{background:#2563eb;border-color:#2563eb;color:#fff}.tab:hover:not(.active){border-color:#475569;color:#e2e8f0}.status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}.status.live{background:#4ade80;box-shadow:0 0 6px #4ade80}.top-bar{display:flex;align-items:center;gap:8px}.top-bar .live-badge{font-size:12px;color:#4ade80;display:flex;align-items:center;gap:4px}@media(max-width:768px){.charts-grid{grid-template-columns:1fr}.container{padding:16px}}
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1><span>Mailchimp</span> Analyser</h1>
      <div class="subtitle">Royal Solskjerming AS</div>
    </div>
    <div class="top-bar">
      <div class="live-badge"><span class="status live"></span> Webhook aktiv</div>
      <button class="sync-btn" onclick="syncData()">Synkroniser</button>
    </div>
  </div>
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview')">Oversikt</button>
      <button class="tab" onclick="switchTab('campaigns')">Kampanjer</button>
      <button class="tab" onclick="switchTab('subscribers')">Abonnenter</button>
      <button class="tab" onclick="switchTab('events')">Hendelser</button>
    </div>
    <div id="content"><div class="loading">Henter data...</div></div>
  </div>
  <script>
    const SUPABASE_URL='https://kypibmznpxqhcnxflcdz.supabase.co';const ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5cGlibXpucHhxaGNueGZsY2R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMDEzODcsImV4cCI6MjA5MTc3NzM4N30.8cJ8OZhfig8WvivK6Wq4_pj6ShR1v8VKP8SetjsfR8E';let currentTab='overview';let chartInstances=[];function destroyCharts(){chartInstances.forEach(c=>c.destroy());chartInstances=[]}async function fetchStats(report){const res=await fetch(`${SUPABASE_URL}/functions/v1/mailchimp-stats?report=${report}`,{headers:{'Authorization':`Bearer ${ANON_KEY}`}});return res.json()}async function syncData(){const btn=document.querySelector('.sync-btn');btn.disabled=true;btn.textContent='Synkroniserer...';try{await fetch(`${SUPABASE_URL}/functions/v1/mailchimp-sync`,{method:'POST',headers:{'Authorization':`Bearer ${ANON_KEY}`,'Content-Type':'application/json'}});btn.textContent='Ferdig!';setTimeout(()=>{btn.textContent='Synkroniser';btn.disabled=false},2000);switchTab(currentTab)}catch(e){btn.textContent='Feil!';setTimeout(()=>{btn.textContent='Synkroniser';btn.disabled=false},2000)}}function rateBadge(rate){if(rate>=30)return`<span class="badge good">${rate}%</span>`;if(rate>=15)return`<span class="badge ok">${rate}%</span>`;return`<span class="badge low">${rate}%</span>`}function formatDate(d){if(!d)return'-';return new Date(d).toLocaleDateString('nb-NO',{day:'numeric',month:'short',year:'numeric'})}async function switchTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>{if(t.textContent.toLowerCase().includes(tab.substring(0,4)))t.classList.add('active')});destroyCharts();const content=document.getElementById('content');content.innerHTML='<div class="loading">Henter data...</div>';try{const{data}=await fetchStats(tab);if(tab==='overview')renderOverview(data);else if(tab==='campaigns')renderCampaigns(data);else if(tab==='subscribers')renderSubscribers(data);else if(tab==='events')renderEvents(data)}catch(e){content.innerHTML='<div class="loading">Kunne ikke hente data.</div>'}}function renderOverview(data){const content=document.getElementById('content');content.innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="label">Abonnenter</div><div class="value blue">${data.total_subscribers||0}</div></div><div class="stat-card"><div class="label">Kampanjer</div><div class="value">${data.total_campaigns||0}</div></div><div class="stat-card"><div class="label">Snitt åpningsrate</div><div class="value green">${data.avg_open_rate||0}%</div></div><div class="stat-card"><div class="label">Snitt klikkrate</div><div class="value amber">${data.avg_click_rate||0}%</div></div><div class="stat-card"><div class="label">Webhook-hendelser</div><div class="value rose">${data.total_events||0}</div></div></div><div class="charts-grid"><div class="chart-card"><h3>Kampanjeytelse (siste 5)</h3><canvas id="campaignChart"></canvas></div><div class="chart-card"><h3>Lister</h3><canvas id="listChart"></canvas></div></div><div class="table-card"><h3>Siste kampanjer</h3><table><thead><tr><th>Emne</th><th>Sendt</th><th>Antall</th><th>Åpningsrate</th><th>Klikkrate</th></tr></thead><tbody>${(data.recent_campaigns||[]).map(c=>`<tr><td>${c.subject||'-'}</td><td>${formatDate(c.send_time)}</td><td>${c.emails_sent||0}</td><td>${rateBadge(c.open_rate)}</td><td>${rateBadge(c.click_rate)}</td></tr>`).join('')}</tbody></table></div>`;const campaigns=data.recent_campaigns||[];const ctx1=document.getElementById('campaignChart').getContext('2d');chartInstances.push(new Chart(ctx1,{type:'bar',data:{labels:campaigns.map(c=>(c.subject||'').substring(0,25)+'...'),datasets:[{label:'Åpningsrate %',data:campaigns.map(c=>c.open_rate),backgroundColor:'#4ade8066',borderColor:'#4ade80',borderWidth:1},{label:'Klikkrate %',data:campaigns.map(c=>c.click_rate),backgroundColor:'#fbbf2466',borderColor:'#fbbf24',borderWidth:1}]},options:{responsive:true,scales:{y:{beginAtZero:true,ticks:{color:'#94a3b8'},grid:{color:'#334155'}},x:{ticks:{color:'#94a3b8',maxRotation:45},grid:{display:false}}},plugins:{legend:{labels:{color:'#e2e8f0'}}}}}));const lists=data.lists||[];if(lists.length>0){const ctx2=document.getElementById('listChart').getContext('2d');chartInstances.push(new Chart(ctx2,{type:'doughnut',data:{labels:lists.map(l=>l.name),datasets:[{data:lists.map(l=>l.members),backgroundColor:['#38bdf8','#4ade80','#fbbf24','#fb7185','#a78bfa'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{labels:{color:'#e2e8f0'}}}}}))}}function renderCampaigns(data){const content=document.getElementById('content');const campaigns=data.campaigns||[];content.innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="label">Totalt kampanjer</div><div class="value">${campaigns.length}</div></div></div><div class="chart-card" style="margin-bottom:24px"><h3>Åpningsrate over tid</h3><canvas id="openRateChart"></canvas></div><div class="table-card"><h3>Alle kampanjer</h3><table><thead><tr><th>Emne</th><th>Fra</th><th>Sendt</th><th>Antall</th><th>Åpningsrate</th><th>Klikkrate</th><th>Avmeldinger</th></tr></thead><tbody>${campaigns.map(c=>`<tr><td>${c.subject||'-'}</td><td>${c.from_name||'-'}</td><td>${formatDate(c.send_time)}</td><td>${c.emails_sent||0}</td><td>${rateBadge(c.open_rate)}</td><td>${rateBadge(c.click_rate)}</td><td>${c.unsubscribes||0}</td></tr>`).join('')}</tbody></table></div>`;const sorted=[...campaigns].reverse();const ctx=document.getElementById('openRateChart').getContext('2d');chartInstances.push(new Chart(ctx,{type:'line',data:{labels:sorted.map(c=>formatDate(c.send_time)),datasets:[{label:'Åpningsrate %',data:sorted.map(c=>c.open_rate),borderColor:'#4ade80',backgroundColor:'#4ade8022',fill:true,tension:.3},{label:'Klikkrate %',data:sorted.map(c=>c.click_rate),borderColor:'#fbbf24',backgroundColor:'#fbbf2422',fill:true,tension:.3}]},options:{responsive:true,scales:{y:{beginAtZero:true,ticks:{color:'#94a3b8'},grid:{color:'#334155'}},x:{ticks:{color:'#94a3b8',maxTicksLimit:15,maxRotation:45},grid:{display:false}}},plugins:{legend:{labels:{color:'#e2e8f0'}}}}}))}function renderSubscribers(data){const content=document.getElementById('content');const dist=data.rating_distribution||{};content.innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="label">Totalt abonnenter</div><div class="value blue">${data.total||0}</div></div></div><div class="charts-grid"><div class="chart-card"><h3>Rating-fordeling</h3><canvas id="ratingChart"></canvas></div><div class="chart-card"><h3>Topp 10 — mest engasjerte</h3><canvas id="engagedChart"></canvas></div></div><div class="table-card"><h3>Mest engasjerte abonnenter</h3><table><thead><tr><th>E-post</th><th>Åpningsrate</th><th>Klikkrate</th><th>Rating</th></tr></thead><tbody>${(data.top_engaged||[]).map(s=>`<tr><td>${s.email}</td><td>${rateBadge(Math.round(s.open_rate*100))}</td><td>${rateBadge(Math.round(s.click_rate*100))}</td><td>${'★'.repeat(s.rating||0)}${'☆'.repeat(5-(s.rating||0))}</td></tr>`).join('')}</tbody></table></div>`;const labels=Object.keys(dist).sort();const ctx1=document.getElementById('ratingChart').getContext('2d');chartInstances.push(new Chart(ctx1,{type:'bar',data:{labels:labels.map(l=>`Rating ${l}`),datasets:[{label:'Antall',data:labels.map(l=>dist[l]),backgroundColor:'#38bdf866',borderColor:'#38bdf8',borderWidth:1}]},options:{responsive:true,scales:{y:{beginAtZero:true,ticks:{color:'#94a3b8'},grid:{color:'#334155'}},x:{ticks:{color:'#94a3b8'},grid:{display:false}}},plugins:{legend:{display:false}}}}));const top=(data.top_engaged||[]).slice(0,10);const ctx2=document.getElementById('engagedChart').getContext('2d');chartInstances.push(new Chart(ctx2,{type:'bar',data:{labels:top.map(s=>s.email.split('@')[0]),datasets:[{label:'Åpningsrate',data:top.map(s=>Math.round(s.open_rate*100)),backgroundColor:'#4ade8066',borderColor:'#4ade80',borderWidth:1},{label:'Klikkrate',data:top.map(s=>Math.round(s.click_rate*100)),backgroundColor:'#fbbf2466',borderColor:'#fbbf24',borderWidth:1}]},options:{indexAxis:'y',responsive:true,scales:{x:{beginAtZero:true,ticks:{color:'#94a3b8'},grid:{color:'#334155'}},y:{ticks:{color:'#94a3b8'},grid:{display:false}}},plugins:{legend:{labels:{color:'#e2e8f0'}}}}}))}function renderEvents(data){const content=document.getElementById('content');const counts=data.event_counts||{};content.innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="label">Hendelser (30 dager)</div><div class="value">${data.total_events||0}</div></div>${Object.entries(counts).map(([type,count])=>`<div class="stat-card"><div class="label">${type}</div><div class="value">${count}</div></div>`).join('')}</div><div class="chart-card" style="margin-bottom:24px"><h3>Hendelser etter type</h3><canvas id="eventChart"></canvas></div><div class="table-card"><h3>Siste hendelser</h3><table><thead><tr><th>Type</th><th>E-post</th><th>Emne</th><th>Tidspunkt</th></tr></thead><tbody>${(data.recent||[]).map(e=>`<tr><td><span class="badge ${e.event_type==='open'||e.event_type==='click'?'good':e.event_type==='bounce'?'low':'ok'}">${e.event_type}</span></td><td>${e.email||'-'}</td><td>${e.subject||'-'}</td><td>${formatDate(e.event_timestamp)}</td></tr>`).join('')}</tbody></table></div>`;const eventLabels=Object.keys(counts);const ctx=document.getElementById('eventChart').getContext('2d');chartInstances.push(new Chart(ctx,{type:'doughnut',data:{labels:eventLabels,datasets:[{data:eventLabels.map(l=>counts[l]),backgroundColor:['#38bdf8','#4ade80','#fbbf24','#fb7185','#a78bfa','#f472b6'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{labels:{color:'#e2e8f0'}}}}}))}switchTab('overview');
  </script>
</body>
</html>
