<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mailchimp Dyp-Analyse — Royal Solskjerming</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      /* BEACON Light Mode */
      --bg: #FFFFFF;
      --card: #F8F7F3;
      --border: #E0D8CC;
      --text: #223142;
      --muted: #666666;
      --dim: #999999;
      --skin: #E8D4B8;
      --skin-light: #F3EAE0;
      /* B&C Brand */
      --bc-blue: #2078A0;
      --bc-green: #5FA643;
      --bc-yellow: #C49A20;
      --bc-ocre: #E8593C;
      --bc-purple: #B04890;
      --bc-teal: #3BB89A;
      --bc-red: #D04030;
      --bc-primary: #223142;
      --bc-primary-light: #4A5A6D;
      /* Spacing */
      --sp-4: 4px; --sp-8: 8px; --sp-12: 12px; --sp-16: 16px; --sp-24: 24px; --sp-32: 32px;
      --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

    .header { background: var(--bc-primary); border-bottom: 1px solid var(--border); padding: var(--sp-24) var(--sp-32); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 22px; font-weight: 500; color: #fff; }
    .header h1 span { color: var(--skin); }
    .header .sub { color: #B8B6AC; font-size: 13px; margin-top: 2px; }
    .top-right { display: flex; align-items: center; gap: var(--sp-12); }
    .health-pill { padding: 6px 14px; border-radius: 14px; font-size: 13px; font-weight: 500; }
    .health-good { background: #e8f5e2; color: #3a7a24; }
    .health-ok { background: #fdf3d7; color: #8a6d10; }
    .health-bad { background: #fde8e5; color: #a83020; }
    .sync-btn { background: var(--skin); color: var(--bc-primary); border: 1px solid var(--skin); padding: var(--sp-12) var(--sp-16); border-radius: var(--radius-md); cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: all .2s; }
    .sync-btn:hover { background: #d4bfa0; transform: translateY(-1px); }
    .sync-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .container { max-width: 1440px; margin: 0 auto; padding: var(--sp-24) var(--sp-32); }
    .tabs { display: flex; gap: var(--sp-8); margin-bottom: var(--sp-24); flex-wrap: wrap; }
    .tab { padding: var(--sp-8) var(--sp-16); border-radius: var(--radius-md); border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; font-family: inherit; transition: all .2s; }
    .tab.active { background: var(--bc-primary); border-color: var(--bc-primary); color: #fff; }
    .tab:hover:not(.active) { border-color: var(--bc-primary-light); color: var(--text); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-24); margin-bottom: var(--sp-24); }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--sp-24); margin-bottom: var(--sp-24); }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--sp-12); margin-bottom: var(--sp-24); }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--sp-24); }
    .card h3 { font-size: 14px; font-weight: 500; margin-bottom: var(--sp-16); color: var(--text); }
    .card .hint { font-size: 12px; color: var(--dim); margin-top: var(--sp-12); line-height: 1.6; }

    .stat { text-align: center; }
    .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: var(--sp-8); }
    .stat .val { font-size: 28px; font-weight: 500; }
    .stat .val.blue { color: var(--bc-blue); }
    .stat .val.green { color: var(--bc-green); }
    .stat .val.yellow { color: var(--bc-yellow); }
    .stat .val.ocre { color: var(--bc-ocre); }
    .stat .val.purple { color: var(--bc-purple); }
    .stat .val.teal { color: var(--bc-teal); }
    .stat .val.red { color: var(--bc-red); }

    .seg-bar { display: flex; height: 32px; border-radius: var(--radius-md); overflow: hidden; margin-bottom: var(--sp-12); }
    .seg-bar div { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; min-width: 40px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: var(--sp-8) 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--dim); border-bottom: 1px solid var(--border); }
    td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--muted); }
    tr:hover td { background: rgba(232,212,184,.15); }
    .badge { display: inline-block; padding: 2px 7px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 500; }
    .badge.good { background: #e8f5e2; color: #3a7a24; }
    .badge.ok { background: #fdf3d7; color: #8a6d10; }
    .badge.low { background: #fde8e5; color: #a83020; }
    .badge.seg { padding: 3px 8px; border-radius: 6px; }

    .insight-box { background: var(--skin-light); border: 1px solid var(--skin); border-radius: var(--radius-lg); padding: var(--sp-16); margin-bottom: var(--sp-24); }
    .insight-box h4 { font-size: 13px; color: var(--bc-primary); margin-bottom: var(--sp-8); font-weight: 500; }
    .insight-box p { font-size: 13px; color: var(--bc-primary-light); line-height: 1.6; }

    .loading { text-align: center; padding: 60px; color: var(--dim); }
    .scrollable { max-height: 400px; overflow-y: auto; }

    .lang-toggle { display: flex; border: 1px solid rgba(255,255,255,.25); border-radius: var(--radius-md); overflow: hidden; }
    .lang-btn { padding: 6px 12px; font-size: 12px; font-weight: 500; background: transparent; border: none; color: rgba(255,255,255,.6); cursor: pointer; font-family: inherit; transition: all .2s; }
    .lang-btn.active { background: var(--skin); color: var(--bc-primary); }
    .lang-btn:hover:not(.active) { color: #fff; }

    @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } .grid-5 { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>

function tr() { return i18n[lang]; }

// BEACON chart colors (light mode friendly)
const BC = { blue: '#2078A0', green: '#5FA643', yellow: '#C49A20', ocre: '#E8593C', purple: '#B04890', teal: '#3BB89A', red: '#D04030' };
const segColors = { superfans: BC.green, engasjerte: BC.blue, passive: BC.yellow, sovende: BC.ocre, ghosts: BC.red };

function segLabel(key) { return tr().seg[key] || key; }
function segAdvice(key) { return tr().segAdvice[key] || ''; }

function destroy() { charts.forEach(c => c.destroy()); charts = []; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  document.querySelector('.header h1').innerHTML = `<span>Mailchimp</span> ${tr().title}`;
  document.querySelector('.sync-btn').textContent = tr().sync;
  document.querySelectorAll('.tab').forEach(tb => { if (tr().tabs[tb.dataset.tab]) tb.textContent = tr().tabs[tb.dataset.tab]; });
  if (D) { updateHealth(); const activeTab = document.querySelector('.tab.active'); if (activeTab) switchTab(activeTab.dataset.tab); }
}

async function load() {
  const res = await fetch(`${SB_URL}/functions/v1/mailchimp-stats?report=deep`, { headers: { Authorization: `Bearer ${KEY}` } });
  const json = await res.json();
  D = json.data;
  updateHealth();
  switchTab('helse');
}

function updateHealth() {
  const pill = document.getElementById('healthPill');
  const s = D.helse.score;
  pill.textContent = `${tr().health}: ${s}%`;
  pill.className = 'health-pill ' + (s >= 40 ? 'health-good' : s >= 25 ? 'health-ok' : 'health-bad');
}

async function syncData() {
  const btn = document.querySelector('.sync-btn');
  btn.disabled = true; btn.textContent = tr().syncing;
  try {
    await fetch(`${SB_URL}/functions/v1/mailchimp-sync`, { method: 'POST', headers: { Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json' } });
    btn.textContent = tr().syncDone;
    setTimeout(async () => { btn.textContent = tr().sync; btn.disabled = false; await load(); }, 1500);
  } catch(e) { btn.textContent = tr().syncFail; setTimeout(() => { btn.textContent = tr().sync; btn.disabled = false; }, 2000); }
}

function rb(rate) {
  if (rate >= 30) return `<span class="badge good">${rate}%</span>`;
  if (rate >= 15) return `<span class="badge ok">${rate}%</span>`;
  return `<span class="badge low">${rate}%</span>`;
}
function fd(d) { return d ? new Date(d).toLocaleDateString(lang === 'no' ? 'nb-NO' : 'en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '-'; }

function chartOpts(extra = {}) {
  return {
    responsive: true,
    plugins: { legend: { labels: { color: '#666666', font: { family: "-apple-system, BlinkMacSystemFont, 'Segoe UI'" } } }, ...extra.plugins },
    scales: {
      y: { beginAtZero: true, ticks: { color: '#666666', ...(extra.yTick || {}) }, grid: { color: '#E0D8CC' }, ...(extra.y || {}) },
      x: { ticks: { color: '#666666', ...(extra.xTick || {}) }, grid: { display: false }, ...(extra.x || {}) },
      ...(extra.scales || {}),
    },
    ...extra.root,
  };
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  destroy();
  const c = document.getElementById('content');
  if (!D) { c.innerHTML = `<div class="loading">${tr().loading}</div>`; return; }
  const r = { helse: renderHelse, segmenter: renderSegmenter, superfans: renderSuperfans, ghosts: renderGhosts, domener: renderDomener, trend: renderTrend, bestworst: renderBestWorst, tags: renderTags };
  (r[tab] || r.helse)();
}

function renderHelse() {
  const h = D.helse; const segs = D.segmenter; const T = tr();
  document.getElementById('content').innerHTML = `
    <div class="insight-box">
      <h4>${T.insights.healthTitle}</h4>
      <p>${h.score >= 40 ? T.insights.healthGood(h.score) : T.insights.healthBad(h.score)}</p>
    </div>
    <div class="grid-5">
      <div class="card stat"><div class="label">${T.stats.subscribers}</div><div class="val blue">${h.total_abonnenter}</div></div>
      <div class="card stat"><div class="label">${T.stats.avgOpen}</div><div class="val green">${h.snitt_open}%</div></div>
      <div class="card stat"><div class="label">${T.stats.avgClick}</div><div class="val yellow">${h.snitt_click}%</div></div>
      <div class="card stat"><div class="label">${T.stats.ghosts}</div><div class="val red">${h.ghosts_prosent}%</div></div>
      <div class="card stat"><div class="label">${T.stats.domains}</div><div class="val purple">${h.unike_domener}</div></div>
    </div>
    <div class="card">
      <h3>${T.charts.engDist}</h3>
      <div class="seg-bar">${segs.map(s => `<div style="width:${s.prosent}%;background:${segColors[s.segment]}" title="${segLabel(s.segment)}: ${s.antall} (${s.prosent}%)">${s.prosent > 8 ? s.prosent + '%' : ''}</div>`).join('')}</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px">
        ${segs.map(s => `<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)"><span style="width:10px;height:10px;border-radius:3px;background:${segColors[s.segment]};display:inline-block"></span>${segLabel(s.segment)}: <strong style="color:var(--text)">${s.antall}</strong> (${s.prosent}%)</div>`).join('')}
      </div>
    </div>
    <div class="grid-2" style="margin-top:20px">
      <div class="card"><h3>${T.charts.segOpen}</h3><canvas id="segOpenChart"></canvas></div>
      <div class="card"><h3>${T.charts.segClick}</h3><canvas id="segClickChart"></canvas></div>
    </div>`;
  const labels = segs.map(s => segLabel(s.segment));
  const colors = segs.map(s => segColors[s.segment]);
  const o = chartOpts({ yTick: { callback: v => v + '%' } });
  charts.push(new Chart(document.getElementById('segOpenChart'), { type: 'bar', data: { labels, datasets: [{ data: segs.map(s => s.snitt_open), backgroundColor: colors.map(c => c + '44'), borderColor: colors, borderWidth: 1 }] }, options: { ...o, plugins: { legend: { display: false } } } }));
